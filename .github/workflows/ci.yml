name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.0
        with:
          cache: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Check formatting
        run: pixi run fmt-check

      - name: Lint
        run: pixi run lint

      - name: Test
        # libtest's --report-time requires nightly (-Z unstable-options), so it
        # can't be used here. `time` wraps the whole suite instead: silent
        # per-test slowness (e.g. the old 5s-per-kill-test from #76) now shows
        # up as suite wall time in the CI log. `shell: bash` runs this step
        # through Git Bash on windows-latest too, so `time` is available on
        # both matrix OSes without a platform branch.
        shell: bash
        run: time pixi run test

      - name: .NET check formatting
        run: pixi run dotnet-fmt-check

      - name: .NET lint
        run: pixi run dotnet-lint

      - name: .NET test
        run: pixi run dotnet-test
