[workspace]
name = "aer-core"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]

[dependencies]
rust = ">=1.80"

[tasks]
build     = "cargo build"
test      = "cargo test"
lint      = "cargo clippy --all-targets -- -D warnings"
fmt       = "cargo fmt --all"
fmt-check = "cargo fmt --all -- --check"
example         = "cargo run --example hello"
example-timeout = "cargo run --example timeout"
example-tree    = "cargo run --example tree"
example-capture = "cargo run --example capture"
example-cancel  = "cargo run --example cancel"

dotnet-build     = { cmd = "dotnet build", cwd = "bindings/dotnet" }
dotnet-test      = { cmd = "dotnet test",  cwd = "bindings/dotnet", depends-on = ["build", "dotnet-build"] }
dotnet-lint      = { cmd = "dotnet build -warnaserror", cwd = "bindings/dotnet" }
dotnet-fmt       = { cmd = "dotnet format", cwd = "bindings/dotnet" }
dotnet-fmt-check = { cmd = "dotnet format --verify-no-changes", cwd = "bindings/dotnet" }
